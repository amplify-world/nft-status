<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="sweep" x1="0" y1="0" x2="32" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>

  <!-- Scan lines -->
  <g clip-path="url(#rounded)">
    <rect x="0" y="7"  width="32" height="1" fill="url(#sweep)" opacity="0.4"/>
    <rect x="0" y="11" width="32" height="1" fill="url(#sweep)" opacity="0.55"/>
    <rect x="0" y="15" width="32" height="2" fill="url(#sweep)" opacity="0.9"/>
    <rect x="0" y="19" width="32" height="1" fill="url(#sweep)" opacity="0.55"/>
    <rect x="0" y="23" width="32" height="1" fill="url(#sweep)" opacity="0.4"/>
  </g>

  <!-- Stake-style 4-point star, centered -->
  <path d="M16 7 L17.6 14.4 L25 16 L17.6 17.6 L16 25 L14.4 17.6 L7 16 L14.4 14.4 Z"
        fill="white"/>
</svg>
